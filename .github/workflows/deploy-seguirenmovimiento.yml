name: Deploy seguirenmovimiento

on:
  push:
    branches: [main]
    paths:
      - "seguirenmovimiento/**"
      - ".github/workflows/deploy-seguirenmovimiento.yml"
  workflow_dispatch: {}

# Evita despliegues simultáneos pisándose entre sí.
concurrency:
  group: deploy-seguirenmovimiento
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout websites (monorepo)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: seguirenmovimiento/package-lock.json

      - name: Install dependencies
        working-directory: seguirenmovimiento
        run: npm ci

      - name: Build
        working-directory: seguirenmovimiento
        env:
          # Mientras no haya dominio propio, el sitio vive bajo
          # https://<usuario>.github.io/seguirenmovimiento/ y necesita
          # este base path. Cuando agregues un dominio en Hostinger,
          # borra esta línea (o déjala vacía) y añade SITE_URL abajo.
          BASE_PATH: /seguirenmovimiento/
        run: npm run build

      # Publica el contenido de dist/ en la rama gh-pages del repo
      # "seguirenmovimiento" (repo de despliegue, separado del monorepo).
      - name: Deploy to seguirenmovimiento (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_PAT }}
          external_repository: ${{ github.repository_owner }}/seguirenmovimiento
          publish_branch: gh-pages
          publish_dir: ./seguirenmovimiento/dist
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
